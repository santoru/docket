<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E2A3A"/>
      <stop offset="100%" style="stop-color:#0F1922"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6EE7B7"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6EE7B7"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#bg)"/>
  <!-- Gradient ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#ring)" stroke-width="18" opacity="0.3"/>
  <!-- Inner glow circle -->
  <circle cx="256" cy="256" r="110" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>
  <!-- Checkmark -->
  <path d="M 175 262 L 230 320 L 340 200" fill="none" stroke="url(#check)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
